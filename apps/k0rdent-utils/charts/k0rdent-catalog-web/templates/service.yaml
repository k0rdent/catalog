apiVersion: v1
kind: Service
metadata:
  name: {{ include "k0rdent-catalog-web.fullname" . }}
  labels:
    {{- include "k0rdent-catalog-web.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "k0rdent-catalog-web.selectorLabels" . | nindent 4 }}

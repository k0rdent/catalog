title: "InfluxDB v2"
summary: "InfluxDB is a purpose-built time-series database optimized for high-ingest workloads of timestamped measurements — sensor readings, performance counters, financial ticks, and IoT events. Its SQL and Flux query interfaces, columnar storage engine, and native downsampling make it the preferred backend for AI applications that train predictive models on time-ordered operational data."
logo: "./assets/icon.svg" # https://influxdata.github.io/branding/img/downloads/cubo-teal.svg
created: "2025-11-05T00:00:00Z"
description: |
  InfluxDB Core is a database built to collect, process, transform, and store event and time series data. It is ideal for use cases that require real-time ingest and fast query response times to build user interfaces, monitoring, and automation solutions.

  Common use cases include:

  - Monitoring sensor data
  - Server monitoring
  - Application performance monitoring
  - Network monitoring
  - Financial market and trading analytics
  - Behavioral analytics

  InfluxDB is optimized for scenarios where near real-time data monitoring is essential and queries 
  need to return quickly to support user experiences such as dashboards and interactive user interfaces.

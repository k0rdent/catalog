title: "NetApp"
summary: "NetApp Trident is NetApp's official CNCF-certified CSI driver for Kubernetes, dynamically provisioning NFS, iSCSI, NVMe/TCP, and S3 volumes from ONTAP on-premises, Cloud Volumes ONTAP, Azure NetApp Files, and Amazon FSx for NetApp ONTAP. Its snapshots, cloning, and QoS policies enable AI teams to instantly duplicate large training datasets for parallel experiments without copying data."
logo: "https://raw.githubusercontent.com/NetApp/trident/master/logo/trident.png"
created: "2025-03-12T08:16:55Z"
description: |
    NetApp Trident is a Container Storage Interface (CSI) that integrates with Kubernetes to manage
    and consume storage resources. It's an open-source project that helps containerized
    applications meet their storage needs.

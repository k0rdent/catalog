title: "Qdrant"
summary: "Qdrant is a high-performance vector similarity search engine written in Rust, purpose-built for production retrieval-augmented generation and recommendation workloads. It supports HNSW indexing, payload filtering, sparse vectors, binary quantization, and named vectors per point, all accessible via a clean REST and gRPC API — with consistently faster query throughput than alternatives at equivalent recall rates."
logo: "./assets/icon.svg" # https://qdrant.tech/brand-resources/
created: "2025-09-04T17:51:52Z"
description: |
    **Qdrant** (read: _quadrant_) is a vector similarity search engine and vector database.

    It provides a production-ready service with a convenient API to store, search, and manage points—vectors with an additional payload
    Qdrant is tailored to extended filtering support. It makes it useful for all sorts of neural-network or semantic-based matching, faceted search, and other applications.

    Qdrant is written in Rust 🦀, which makes it fast and reliable even under high load. See [benchmarks](https://qdrant.tech/benchmarks/).

    With Qdrant, embeddings or neural network encoders can be turned into full-fledged applications for matching, searching, recommending, and much more!

    Qdrant is also available as a fully managed **[Qdrant Cloud](https://cloud.qdrant.io/)** ⛅ including a **free tier**.

doc_link: https://qdrant.tech/documentation/guides/installation/#qdrant-kubernetes-operator


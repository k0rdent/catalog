title: ArangoDB
summary: "ArangoDB is a natively multi-model database combining document storage, key-value, and graph traversal in a single engine with its own AQL query language. Its integrated graph capabilities make it well-suited for knowledge graphs and entity relationship data that power RAG pipelines and AI recommendation systems."
logo: "./assets/arangodb_logo.png"
created: "2025-03-18T11:58:30Z"
github_repo: arangodb/kube-arangodb
description: |
    ArangoDB combines the analytical power of native graphs with an integrated search engine,
    JSON support, and a variety of data access patterns via a single, composable query language.

    ArangoDB is available in a community and a commercial edition. You can use it for on-premises
    deployments, as well as a fully managed cloud service, the ArangoGraph Insights Platform.

why_in_catalog: "Most AI applications eventually need to model relationships between entities — documents linked to authors, products connected to categories, knowledge graph nodes connected by semantic edges. ArangoDB handles all of that in a single engine without forcing a polyglot persistence architecture. Its integrated graph traversal and AQL query language make it particularly well-suited for knowledge graphs that power RAG systems and AI-driven recommendation engines."

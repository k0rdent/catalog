traefik:
  traefik:
    deployment:
      kind: DaemonSet
    ports:
      web:
        port: 8000
        hostPort: 80
      websecure:
        port: 8443
        hostPort: 443

prometheus:
  prometheus:
    server:
      ingress:
        enabled: true
        hosts: ['']
      persistentVolume:
        enabled: false

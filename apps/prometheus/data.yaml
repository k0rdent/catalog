title: "Prometheus"
summary: "Prometheus is the CNCF-graduated time-series monitoring system and the de-facto standard metrics backend for Kubernetes. It scrapes instrumented targets on a pull model, evaluates alerting and recording rules, and stores metrics in a local TSDB with a powerful PromQL query language. The NVIDIA DCGM exporter, kube-state-metrics, and virtually every cloud-native application expose Prometheus metrics natively."
logo: "https://raw.githubusercontent.com/prometheus/prometheus.github.io/master/assets/prometheus_logo-cb55bb5c346.png"
created: "2025-03-12T08:16:55Z"
description: |
    Prometheus is an open-source systems monitoring and alerting toolkit originally built at SoundCloud.
    Since its inception in 2012, many companies and organizations have adopted Prometheus, and
    the project has a very active developer and user community.


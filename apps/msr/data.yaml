title: "Mirantis Secure Registry"
summary: "Mirantis Secure Registry (MSR) 4 is an enterprise container registry built on CNCF Harbor that adds Mirantis-managed installation, upgrades, and support on top of Harbor's role-based access control, vulnerability scanning, content trust, and replication capabilities. It gives teams running Mirantis Kubernetes Engine a fully integrated, on-premises registry with a single vendor support relationship."
logo: "./assets/msr_logo.svg"
created: "2025-03-12T15:33:55Z"
description: |
    Mirantis Secure Registry (MSR) 4 is an Enterprise-grade container registry solution based on CNCF Harbor that can
    be integrated easily with k0rdent managed clusters.

    This chart contains Mirantis Secure Registry 4 without the high-availability for the storage
    layer (Postgres & Redis). Please check the link for more information on
    [high-availability](https://docs.mirantis.com/msr/4.0/install/installation-with-high-availability.html){ target="_blank" .bold }.

support_link: https://docs.mirantis.com/msr/4.13/get-support.html
doc_link: https://docs.mirantis.com/msr/4.13/overview.html


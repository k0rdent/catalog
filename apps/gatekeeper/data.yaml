title: "Gatekeeper"
summary: "OPA Gatekeeper is the CNCF policy controller that enforces Open Policy Agent rules at the Kubernetes admission webhook, blocking non-compliant resources before they are created. It uses ConstraintTemplates written in Rego to codify any governance requirement — from mandatory GPU resource limits on AI workloads to required security context fields — as auditable, version-controlled policy."
logo: "./assets/gatekeeper.svg"
created: "2025-03-28T14:40:08Z"
github_repo: open-policy-agent/gatekeeper
description: |
    A customizable cloud native policy controller that helps enforce policies and strengthen governance.

why_in_catalog: "Kyverno policies are YAML-native and approachable. OPA Gatekeeper policies are written in Rego and are more expressive for complex governance logic — multi-resource constraints, external data lookups, and hierarchical policy structures. For organizations with existing OPA investment or compliance requirements that demand policy-as-code with auditable, version-controlled Rego, Gatekeeper is the admission controller that delivers that model without requiring a complete policy rewrite."

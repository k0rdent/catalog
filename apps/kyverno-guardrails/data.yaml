tags:
  - Security
title: "Kyverno Guardrails"
summary: "Kyverno Guardrails is a ready-to-apply collection of curated Kyverno ClusterPolicies that enforce Kubernetes security best practices — blocking host-network access, requiring read-only root filesystems, mandating resource limits, and more — without requiring teams to author policy from scratch. It provides an immediate security baseline for new clusters with a single Helm install."

summary: "n8n is a self-hosted, fair-code workflow automation platform with a visual node-based editor and 400+ pre-built integrations for APIs, databases, and SaaS services. Its code nodes support arbitrary JavaScript and Python, enabling data science teams to build ETL pipelines, AI-triggered notification workflows, and data labeling automation that run entirely within their own infrastructure."
logo: "./assets/n8n_pink_black.png"
description: |
  N8n is a fair-code workflow automation platform that combines a no-code visual builder
  with the flexibility of code (JavaScript, Python) to connect apps and APIs
  and build multi-step, AI-driven workflows.

  Key features:

  - Self-hosting
  - Strong security
  - Over 400 integrations
  - Support for AI agents using models
  - Large community for templates and extensions

  [Official doc](https://docs.n8n.io/)


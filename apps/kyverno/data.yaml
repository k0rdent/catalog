tags:
  - Security
title: "Kyverno"
summary: "Kyverno is a CNCF Kubernetes-native policy engine that validates, mutates, and generates resources using policies written in YAML — no Rego required. Platform teams use it to enforce GPU resource limits, inject required labels, block privileged containers, and auto-generate NetworkPolicies, providing programmable guardrails that keep AI workloads compliant by construction."
logo: ./assets/icon.svg # https://github.com/cncf/artwork/blob/main/projects/kyverno/icon/color/kyverno-icon-color.svg
created: "2025-03-12T08:16:55Z"
github_repo: kyverno/kyverno
description: |
    Kyverno is a powerful open-source policy engine designed specifically for Kubernetes. It allows you to define and enforce policies that govern the configuration and behavior of your Kubernetes resources, ensuring security, compliance, and operational best practices. 
    Here's a breakdown of its key features:

    - Kubernetes Native: Kyverno is built for Kubernetes, using the same YAML format and API objects as Kubernetes itself, making it easy to learn and use.
    - Policy-as-Code: Define policies as code, enabling version control, collaboration, and automation. 
    - Validation and Mutation: Kyverno can validate resources against policies before they are created or modified, and it can also mutate resources to enforce compliance. 
    - Image Verification: Verify the integrity and provenance of container images, ensuring that only trusted images are deployed. 
    - Resource Validation: Validate resource configurations against security and compliance standards, preventing misconfigurations. 
    - RBAC Integration: Integrates with Kubernetes RBAC to control who can create, modify, and apply policies.

why_in_catalog: "Security policies that exist only as documentation do not prevent misconfigured GPU workloads from running without resource limits, containers from running as root, or sensitive namespaces from being accessed by workloads that should not reach them. Kyverno enforces those policies at the admission webhook in YAML — no Rego required — blocking non-compliant resources before they are created, mutating resources to add required fields automatically, and generating dependent resources like NetworkPolicies. It is the policy engine that turns security requirements from a checklist into a technical control."
support_link: https://nirmata.com/nirmata-enterprise-for-kyverno/

doc_link: https://kyverno.github.io/kyverno/


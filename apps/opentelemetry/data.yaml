tags:
  - Monitoring
title: OpenTelemetry
summary: "The OpenTelemetry Collector is the CNCF-standard vendor-neutral telemetry pipeline that receives traces, metrics, and logs from instrumented applications, processes and enriches them, and exports to any backend — Jaeger, Prometheus, Loki, Datadog, or cloud-native services. Standardizing on OTel eliminates vendor lock-in for observability data and allows AI teams to switch backends without re-instrumenting code."
logo: "./assets/icon.svg" # https://techicons.dev/icons/opentelemetry
created: "2025-12-09T00:00:00Z"
description: |
    OpenTelemetry, also known as OTel, is a vendor-neutral open source Observability
    framework for instrumenting, generating, collecting, and exporting telemetry data
    such as traces, metrics, and logs.

    As an industry-standard, OpenTelemetry is supported by more than 90 observability
    vendors, integrated by many libraries, services, and apps, and adopted by numerous
    end users.


doc_link: https://opentelemetry.io/docs/platforms/kubernetes/helm/

test_wait_for_pods: "opentelemetry-collector-agent- opentelemetry-operator-"


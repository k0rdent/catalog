loki:
  loki:
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: 2024-01-01
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      storage_config:
        filesystem:
          directory: /var/loki/chunks
      compactor:
        working_directory: /var/loki/compactor
      limits_config:
        allow_structured_metadata: true
        volume_enabled: true
    singleBinary:
      replicas: 1
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0
    persistence:
      enabled: true
      size: 3Gi

traefik:
  traefik:
    deployment:
      kind: DaemonSet
    ports:
      web:
        port: 8000
        hostPort: 80
      websecure:
        port: 8443
        hostPort: 443

raw1:
  raw:
    resources:
    - apiVersion: v1
      kind: Namespace
      metadata:
        name: prometheus
        labels:
          istio-injection: enabled

raw2:
  raw:
    resources:
    - apiVersion: monitoring.coreos.com/v1
      kind: PodMonitor
      metadata:
        name: istio-sidecars
        namespace: istio-system
        labels:
          release: prometheus
      spec:
        namespaceSelector:
          any: true
        selector:
          matchLabels:
            security.istio.io/tlsMode: istio
        podMetricsEndpoints:
          - port: http-envoy-prom
            path: /stats/prometheus
            interval: 15s

prometheus:
  kube-prometheus-stack:
    prometheus:
      prometheusSpec:
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 5Gi

kiali-operator:
  kiali-operator:
    cr:
      create: true
      namespace: istio-system
      spec:
        server:
          web_root: "/" # default: /kiali
        deployment:
          ingress:
            class_name: "traefik"
            enabled: true
        auth:
          strategy: anonymous
        external_services:
          prometheus:
            url: http://prometheus-kube-prometheus-prometheus.prometheus:9090

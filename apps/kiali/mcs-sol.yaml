apiVersion: k0rdent.mirantis.com/v1beta1
kind: MultiClusterService
metadata:
  name: kiali
spec:
  clusterSelector:
    matchLabels:
      group: demo
  serviceSpec:
    services:
    - template: traefik-39-0-5
      name: traefik
      namespace: traefik
      values: |
        traefik:
          deployment:
            kind: DaemonSet
          ports:
            web:
              port: 8000
              hostPort: 80
            websecure:
              port: 8443
              hostPort: 443
    - template: istio-base-1-28-3
      name: istio-base
      namespace: istio-system
    - template: istiod-1-28-3
      name: istiod
      namespace: istio-system
      dependsOn:
      - name: istio-base
        namespace: istio-system
    - template: raw-2-0-2
      name: raw1
      namespace: raw
      dependsOn:
      - name: istiod
        namespace: istio-system
      values: |
        raw:
          resources:
          - apiVersion: v1
            kind: Namespace
            metadata:
              name: prometheus
              labels:
                istio-injection: enabled
    - template: kube-prometheus-stack-81-6-3
      name: prometheus
      namespace: prometheus
      dependsOn:
      - name: raw1
        namespace: raw
      values: |
        kube-prometheus-stack:
          prometheus:
            prometheusSpec:
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 5Gi
    - template: raw-2-0-2
      name: raw2
      namespace: raw
      dependsOn:
      - name: prometheus
        namespace: prometheus
      values: |
        raw:
          resources:
          - apiVersion: monitoring.coreos.com/v1
            kind: PodMonitor
            metadata:
              name: istio-sidecars
              namespace: istio-system
              labels:
                release: prometheus
            spec:
              namespaceSelector:
                any: true
              selector:
                matchLabels:
                  security.istio.io/tlsMode: istio
              podMetricsEndpoints:
                - port: http-envoy-prom
                  path: /stats/prometheus
                  interval: 15s
    - template: kiali-operator-2-21-0
      name: kiali-operator
      namespace: kiali
      dependsOn:
      - name: raw2
        namespace: raw
      values: |
        kiali-operator:
          cr:
            create: true
            namespace: istio-system
            spec:
              server:
                web_root: "/" # default: /kiali
              deployment:
                ingress:
                  class_name: "traefik"
                  enabled: true
              auth:
                strategy: anonymous
              external_services:
                prometheus:
                  url: http://prometheus-kube-prometheus-prometheus.prometheus:9090
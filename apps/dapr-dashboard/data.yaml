tags:
- Developer Tools
title: Dapr Dashboard
summary: Web UI for monitoring Dapr sidecars, components, and configurations.
logo: ./assets/dapr-logo.svg
created: '2026-04-24T00:00:00Z'
description: |
    Dapr Dashboard is a web-based UI for monitoring and managing Dapr applications running in Kubernetes.
    It provides real-time visibility into Dapr sidecar status, component configurations, pub/sub topics,
    service invocation endpoints, and actor instances across all namespaces.

    The dashboard helps platform engineers and developers quickly diagnose issues with Dapr-enabled
    workloads by showing sidecar injection status, component health, and configuration details without
    requiring kubectl access. It integrates with the Dapr control plane to display the state of all
    Dapr resources in the cluster.
show_install_tab: true
github_repo: dapr/dashboard

examples:
    with_ingress:
        title: With Ingress
        chart_folder: example_ingress

validated_amd64: 'y'
validated_aws: 'y'
validated_azure: 'y'
validated_arm64: 'y' # aws t4g.medium
validated_local: 'y'

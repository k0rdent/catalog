summary: "Kagent is a Kubernetes-native agentic AI framework that lets teams define, deploy, and manage AI agents as first-class Kubernetes resources using standard CRDs. Agents can call tools, browse the web, execute code, and interact with cluster APIs — enabling self-healing operations, intelligent alert triage, and policy-driven remediation workflows that run directly inside the cluster."

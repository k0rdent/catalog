tags:
  - Security
title: "Cert-manager"
summary: "cert-manager is the de-facto standard Kubernetes certificate controller, automating issuance and renewal from Let's Encrypt, Vault, AWS ACM, and custom CAs via a CRD-driven API. It eliminates certificate expiry incidents and ensures mTLS between AI microservices is always current without manual intervention."
logo: "https://github.com/cert-manager/cert-manager/blob/master/logo/logo-small.png?raw=true"
created: "2025-03-12T08:16:55Z"
github_repo: cert-manager/cert-manager
description: |
    Cert-manager is a Kubernetes add-on that automates the management of TLS certificates.
    It can issue, renew, and validate certificates from various sources, including public and private issuers.

why_in_catalog: "TLS certificates that expire unexpectedly are one of the most common causes of production outages, and manually rotating certificates across a multi-cluster AI platform is operationally untenable. cert-manager eliminates the problem entirely by automating issuance and renewal from any CA, ensuring mTLS between model serving components, feature stores, and databases is always current. It is a prerequisite for nearly every other security integration in this catalog."
support_link: https://cert-manager.io/support/

doc_link: https://cert-manager.io/docs/installation/helm/


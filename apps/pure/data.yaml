title: "Pure"
summary: "The Pure Storage CSI driver provisions block and file volumes from Pure Storage FlashArray and FlashBlade arrays, supporting dynamic provisioning, snapshots, cloning, and volume expansion through the CSI specification. Its NVMe/FC and NVMe/RoCE transport support delivers the sub-100µs latency that checkpoint-heavy AI training workloads need when writing model state to persistent storage."
logo: "https://raw.githubusercontent.com/purestorage/helm-charts/master/pure-csi/pure-storage.png"
created: "2025-03-12T08:16:55Z"
github_repo: purestorage/helm-charts
description: |
    Pure Storage CSI is a plugin that allows Kubernetes to access storage on Pure Storage's FlashArray
    and FlashBlade devices. CSI stands for Container Storage Interface. It's a standard that enables
    storage systems to communicate with Kubernetes.

why_in_catalog: "Pure Storage FlashArray and FlashBlade deliver the NVMe-over-Fabrics performance and sub-100µs latency that checkpoint-intensive training workloads require when writing model state to persistent storage. The Pure CSI driver brings those arrays into the Kubernetes storage model with dynamic provisioning, snapshots, cloning, and volume expansion through the CSI specification. For organizations with Pure Storage infrastructure, it is the integration that makes enterprise storage performance available to AI workloads without leaving the declarative Kubernetes management model."
support_link: https://support.purestorage.com/

doc_link: https://github.com/purestorage/helm-charts


title: "Falco"
tags:
  - Security
summary: "Falco is the CNCF runtime security project that uses eBPF probes and a rules engine to detect unexpected behavior inside containers in real time — system call anomalies, privilege escalation, file integrity violations, and network connections from model serving pods. It generates structured alerts that feed SIEM systems and is required for HIPAA and FedRAMP runtime threat-detection controls."
logo: "./assets/falco-logo-small.svg" # https://icon-icons.com/icon/falco-logo/171164
logo_big: "./assets/falco-logo.svg"
created: "2025-04-16T13:06:51Z"
github_repo: falcosecurity/falco
description: |
    Falco is a cloud native security tool that provides runtime security across hosts, containers, Kubernetes, and cloud environments. It leverages custom rules on Linux kernel events and other data sources through plugins, enriching event data with contextual metadata to deliver real-time alerts. Falco enables the detection of abnormal behavior, potential security threats, and compliance violations.

why_in_catalog: "Admission policies tell you what should not be deployed. Falco tells you what is actually happening at runtime — a model serving container opening a shell, a training pod making an unexpected outbound network connection, a process attempting privilege escalation inside a GPU workload. It uses eBPF probes and a rules engine to detect those behaviors in real time and generate structured alerts that feed SIEM systems. For HIPAA and FedRAMP workloads, runtime threat detection is not optional, and Falco is the CNCF-graduated implementation that satisfies that requirement."

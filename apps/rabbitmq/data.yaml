title: RabbitMQ
summary: "RabbitMQ is a battle-proven, standards-based message broker supporting AMQP 0-9-1, AMQP 1.0, MQTT, STOMP, and WebSocket protocols with configurable durability, routing exchanges, and consumer acknowledgements. Its Kubernetes operator manages cluster formation, rolling upgrades, and topology-aware replication, making RabbitMQ a reliable task queue for AI workloads that need guaranteed message delivery and dead-letter handling."

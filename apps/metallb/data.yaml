title: "MetalLB"
summary: "MetalLB implements the Kubernetes LoadBalancer service type for bare-metal clusters that lack a cloud provider's load balancer controller. Using either Layer 2 ARP announcements or BGP route advertisements, it assigns external IP addresses to services so on-premises AI inference endpoints are reachable from outside the cluster without a hardware load balancer."
logo: "./assets/metallb_logo.svg"
created: "2025-03-19T17:58:28Z"
github_repo: metallb/metallb
description: |
    MetalLB hooks into your Kubernetes cluster, and provides a network load-balancer implementation.
    In short, it allows you to create Kubernetes services of type LoadBalancer in clusters that don’t
    run on a cloud provider, and thus cannot simply hook into paid products to provide load balancers.

why_in_catalog: "Bare-metal and on-premises Kubernetes clusters do not have a cloud provider's load balancer controller to assign external IPs to Services of type LoadBalancer. Without MetalLB, those Services remain in a perpetual Pending state, and AI inference endpoints are only reachable through NodePort workarounds that expose node-level ports rather than stable service IPs. MetalLB solves this with either Layer 2 ARP announcements or BGP route advertisements, giving on-premises clusters the same LoadBalancer semantics that cloud clusters take for granted."

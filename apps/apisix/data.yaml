title: Apache APISIX
summary: "Apache APISIX is a high-performance, cloud-native API gateway with dynamic routing, authentication, rate limiting, and a plugin ecosystem of 80+ extensions. It handles millions of requests per second and supports gRPC, WebSocket, and HTTP/3, making it a strong fit for AI inference APIs that require low-latency traffic shaping."
logo: "./assets/icon.svg" # https://www.apache.org/logos/originals/apisix.svg
created: "2025-12-08T00:00:00Z"
description: |
    ### Open-Source, Community-Driven, Future-Ready
    APISIX API Gateway provides rich traffic management features like load balancing, dynamic
    upstream, canary release, circuit breaking, auth, and observability.

    ### Building for large-scale, high value systems
    Apache APISIX provides open source API Gateway to help you manage microservices, delivering
    the ultimate performance, security, and scalable platform for all your APIs and microservices.



title: "MySQL"
summary: "The MySQL Operator for Kubernetes manages MySQL InnoDB Cluster — MySQL's native HA solution with Group Replication and MySQL Router — as a first-class Kubernetes workload, automating provisioning, failover, backup, and cluster expansion through a MySQLCluster CRD. It is the recommended way to run MySQL with automatic failover and read-scale-out on Kubernetes."
logo: "./assets/MySQL_logo.svg"
created: "2025-03-17T11:50:06Z"
github_repo: mysql/mysql-operator
description: |
  k0rdent facilitates the deployment and management of MySQL within Kubernetes clusters by
  leveraging its multi-cluster management capabilities. While not a direct integration at
  the application level, k0rdent simplifies the orchestration of the Kubernetes environment
  where MySQL operates. Through k0rdent, users can easily deploy MySQL service templates,
  manage persistent storage, scale deployments, monitor pod health, and enforce security
  policies across multiple clusters. This indirect integration streamlines the process of
  running and maintaining MySQL databases in containerized environments, providing a
  centralized control plane for managing the underlying Kubernetes infrastructure.

why_in_catalog: "MySQL InnoDB Cluster with Group Replication is a mature, battle-tested solution for high-availability relational data, and the MySQL Operator makes it a first-class Kubernetes workload with automated provisioning, failover, and rolling upgrades. For AI applications that are built on MySQL — whether legacy systems being modernized or new applications where the team's operational expertise is in MySQL rather than PostgreSQL — the operator brings enterprise HA semantics to the database tier without requiring a migration."

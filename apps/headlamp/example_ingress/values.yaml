traefik:
  traefik:
    deployment:
      kind: DaemonSet
    ports:
      web:
        port: 8000
        hostPort: 80
      websecure:
        port: 8443
        hostPort: 443

headlamp:
  headlamp:
    ingress:
      enabled: true
      hosts:
        - host: ''
          paths:
            - path: "/"
              type: Prefix

raw:
  raw:
    resources:
    - apiVersion: v1
      kind: Secret
      type: kubernetes.io/service-account-token
      metadata:
        name: headlamp-token
        namespace: headlamp
        annotations:
          kubernetes.io/service-account.name: headlamp
          kubernetes.io/service-account.namespace: headlamp

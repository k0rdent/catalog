traefik:
  traefik:
    deployment:
      kind: DaemonSet
    ports:
      web:
        port: 8000
        hostPort: 80
      websecure:
        port: 8443
        hostPort: 443

headlamp:
  headlamp:
    ingress:
      enabled: true
      hosts:
        - host: ''
          paths:
            - path: "/"
              type: Prefix

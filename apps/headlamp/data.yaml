tags:
  - Monitoring
title: Headlamp
summary: "Headlamp is a fast, extensible Kubernetes dashboard that renders live cluster state through a plugin-based architecture, allowing teams to add custom views for CRDs, operators, and internal tooling. Unlike kubectl, it provides a friendly graphical interface for browsing pods, inspecting GPU resource allocations, and monitoring multi-cluster k0rdent deployments without granting broad CLI access."
logo: "./assets/headlamp.png" # https://github.com/kubernetes-sigs/headlamp/blob/main/docs/images/icon.svg
logo_big: "./assets/headlamp-big.svg" # https://headlamp.dev/img/logo.svg
created: "2025-07-10T16:26:02Z"
description: |
    Headlamp is an easy-to-use and extensible Kubernetes web UI.

    Headlamp was created to blend the traditional feature set of other web UIs/dashboards
    (i.e., to list and view resources) with added functionality.

    Headlamp can be used in-cluster, where it's accessed through a web browser, or as a desktop
    application (using the information defined in the user's kubeconfig).

description: |
    HAProxy Kubernetes Ingress Controller is a high-performance, enterprise-grade ingress solution for Kubernetes
    built on the industry-proven HAProxy load balancer. It provides advanced Layer 7 traffic management including
    content-based routing, rate limiting, connection queuing, and Web Application Firewall (WAF) capabilities.

    HAProxy's event-driven architecture handles millions of concurrent connections with minimal resource consumption,
    making it suitable for high-throughput AI inference endpoints and large-scale API gateways. It supports both the
    traditional Kubernetes Ingress API and the newer Gateway API specification.

    Key features include SSL/TLS termination and passthrough, advanced health checking, circuit breaking,
    sticky sessions, and comprehensive metrics via Prometheus integration. The controller automatically
    discovers and configures routes based on Kubernetes Ingress and Gateway API resources.


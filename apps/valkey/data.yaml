title: Valkey
summary: "Valkey is a high-performance, open-source, BSD-licensed fork of Redis maintained by the Linux Foundation, fully compatible with the Redis 7.2 API including all data structures, commands, persistence modes, and the RESP3 protocol. It was created after Redis changed its licensing, giving the community a truly open alternative for caching, pub/sub, and feature store use cases in AI workloads."
logo: "./assets/valkey_logo.svg"
logo_big: "./assets/valkey_logo_big.svg"
created: "2025-06-16T14:20:00Z"
github_repo: valkey-io/valkey
description: |
    Valkey is a high-performance in-memory data store that supports various data structures
    including strings, hashes, lists, sets, and sorted sets. It's a drop-in replacement for
    Redis with enhanced features and performance optimizations. Valkey can be used as a
    database, cache, message broker, and streaming engine.

why_in_catalog: "When Redis changed its license in 2024, the community forked it as Valkey under the Linux Foundation with BSD licensing and a governance model that ensures it remains genuinely open source. Valkey is fully API-compatible with Redis 7.2 — the same data structures, commands, persistence modes, and RESP3 protocol — so existing Redis workloads migrate without code changes. For organizations with open-source licensing requirements or concerns about Redis's licensing trajectory, it is the drop-in alternative that maintains compatibility without the license risk."

tags:
  - Developer Tools
title: "JupyterHub"
summary: "JupyterHub spawns isolated, authenticated Jupyter server instances for each user from a single multi-tenant deployment, giving data science teams on-demand notebook environments with configurable CPU, memory, and GPU resource profiles. Its KubeSpawner back-end creates per-user pods with persistent volume mounts, making it the standard way to provide self-service compute to ML researchers on Kubernetes."
logo: ./assets/juphub-icon.svg # https://www.veryicon.com/icons/business/vscode-program-item-icon/jupyter.html
logo_big: ./assets/juphub-big.svg # https://jupyter.org/hub
created: "2025-07-30T08:16:55Z"
github_repo: jupyterhub/zero-to-jupyterhub-k8s
description: |
    JupyterHub brings the power of notebooks to groups of users. It gives users access to
    computational environments and resources without burdening the users with installation and
    maintenance tasks. Users - including students, researchers, and data scientists - can
    get their work done in their own workspaces on shared resources which can be managed
    efficiently by system administrators.

    JupyterHub runs in the cloud or on your own hardware, and makes it possible to serve
    a pre-configured data science environment to any user in the world. It is customizable
    and scalable, and is suitable for small and large teams, academic courses, and large-scale
    infrastructure.

why_in_catalog: "Data scientists should not need to provision their own Kubernetes infrastructure to run experiments. JupyterHub spawns isolated, authenticated notebook environments with configurable CPU, memory, and GPU resource profiles from a single multi-tenant deployment — giving researchers on-demand compute through a browser without granting them cluster access. Its KubeSpawner backend creates per-user pods with persistent volume mounts, making it the standard self-service compute surface for ML teams on Kubernetes."

apiVersion: v2
name: example
type: application
version: 1.0.0
dependencies:
  - name: istio-base
    version: 1.28.3
    repository: oci://ghcr.io/k0rdent/catalog/charts
    solution_role: Mesh CRDs
    solution_why: Installs Istio custom resource definitions required by the control plane
  - name: istiod
    version: 1.28.3
    repository: oci://ghcr.io/k0rdent/catalog/charts
    solution_role: Control Plane
    solution_why: Manages mTLS certificate rotation and enforces traffic policies
  - name: istio-gateway
    version: 1.28.3
    repository: oci://ghcr.io/k0rdent/catalog/charts
    solution_role: Ingress Gateway
    solution_why: Terminates external TLS and routes traffic into the mesh
  - name: kube-prometheus-stack
    version: 81.6.3
    repository: oci://ghcr.io/k0rdent/catalog/charts
    solution_role: Monitoring
    solution_why: Collects Istio metrics and provides Grafana dashboards for mesh health

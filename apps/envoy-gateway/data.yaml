title: "Envoy Gateway"
tags:
  - Networking
summary: "Envoy Gateway implements the Kubernetes Gateway API on top of Envoy Proxy, providing a standardized, vendor-neutral way to configure HTTP routing, TLS termination, traffic splitting, and rate limiting for services running inside a cluster. It replaces bespoke Ingress annotations with portable Gateway resources that work identically across cloud providers."
logo: "./assets/envoy-gateway_logo.svg" # https://github.com/cncf/artwork/blob/main/projects/opencost/horizontal/color/Opencost_Horizontal_Color.svg
logo_big: "./assets/envoy-gateway-big_logo.svg" # https://github.com/cncf/artwork/blob/main/projects/envoy/envoy-gateway/horizontal/color/envoy-gateway-horizontal-color.svg
created: "2025-03-25T09:17:52Z"
github_repo: envoyproxy/gateway
description: |
  Envoy Gateway is an open source project for managing Envoy Proxy as a standalone or Kubernetes-based application gateway.
  Gateway API resources are used to dynamically provision and configure the managed Envoy Proxies.

why_in_catalog: "The Kubernetes Ingress API was never designed for the routing complexity of modern AI platforms — token-based rate limiting, model-version traffic splits, and cross-cluster service exposure all require annotations that are ingress-controller-specific and non-portable. Envoy Gateway implements the Kubernetes Gateway API standard, giving teams portable, vendor-neutral routing configuration that works identically across cloud providers and does not lock them into a specific controller's annotation dialect."
doc_link: https://gateway.envoyproxy.io/docs/install/install-helm/

title: Tetrate Istio
summary: "Tetrate Istio Distro (TID) is a FIPS 140-2 validated, hardened Istio distribution from Tetrate that provides long-term support, security patches, and enterprise support SLAs on top of upstream Istio. It is the preferred Istio distribution for US Federal and regulated enterprise deployments that require a validated service mesh with a commercially accountable support chain."
logo: "./assets/tetrate.svg" # https://docs.tetrate.io/
logo_big: ./assets/tetrate-big.svg # https://docs.tetrate.io/istio-subscription/
created: "2025-07-31T16:43:20Z"
github_repo: tetratelabs/istio
description: |
    Tetrate Istio is a hardened, enterprise-ready distribution of the Istio service mesh maintained
    by Tetrate. It provides advanced networking, security, and observability features while being
    compatible with upstream Istio and Envoy APIs. This makes it ideal for multi-cluster Kubernetes
    environments, especially when paired with k0rdent for federated deployment and lifecycle management.

why_in_catalog: "Upstream Istio releases on a quarterly cadence that prioritizes new features over long-term stability. US Federal and regulated enterprise deployments need a service mesh with FIPS 140-2 validated cryptography, long-term support windows, security patches backported to stable releases, and a commercially accountable support chain. Tetrate Istio Distro provides all of that on top of upstream Istio, making it the service mesh of choice for organizations where the mesh is a compliance control, not just an infrastructure convenience."

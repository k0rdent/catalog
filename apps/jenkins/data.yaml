title: "Jenkins"
summary: "Jenkins is the battle-tested open-source automation server that powers CI/CD pipelines through a massive plugin ecosystem of 1,800+ integrations. Running Jenkins on Kubernetes with ephemeral pod-based agents lets ML teams execute model training jobs, data validation steps, and integration tests on dynamically provisioned GPU nodes that terminate when the pipeline finishes."

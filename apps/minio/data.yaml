title: "MinIO"
summary: "MinIO is a high-performance, Kubernetes-native object store that implements the full S3 API, delivering over 325 GiB/s read and 165 GiB/s write throughput on NVMe hardware. It serves as the standard backend for MLflow artifacts, model checkpoints, training datasets, and Loki log chunks in AI infrastructure stacks that need S3 semantics without a cloud provider dependency."
logo: "./assets/minio_logo.svg"
created: "2025-03-19T17:51:52Z"
description: |
  MinIO is a High Performance Object Storage released under GNU Affero General Public License v3.0.
  It is API compatible with Amazon S3 cloud storage service.
  Use MinIO to build high performance infrastructure for machine learning, analytics and application data workloads.

title: "Dex"
summary: "Dex is a federated OpenID Connect identity provider that translates logins from upstream identity sources — LDAP, Active Directory, GitHub, Google, SAML 2.0, and more — into OIDC tokens that Kubernetes and its ecosystem can consume natively. It enables single-sign-on for platform tooling including Grafana, Argo CD, and JupyterHub without modifying each application's auth logic."
logo: "https://raw.githubusercontent.com/dexidp/website/9ac240c84d3e34766814cd9ece76710cf075ba23/static/favicons/favicon.png"
created: "2025-03-12T08:16:55Z"
description: |
    Dex is an identity service that acts as a bridge between your Kubernetes cluster and various identity providers. 
    Think of it as a gatekeeper that verifies who you are before granting you access to your Kubernetes resources.
support_link: https://dexidp.io/docs/guides/kubernetes/
deploy_code: |
    ~~~yaml
    apiVersion: k0rdent.mirantis.com/v1beta1
    kind: ClusterDeployment
    # kind: MultiClusterService
    ...
    serviceSpec:
        services:
          - template: dex-0-24-0
            name: dex
            namespace: dex
            values: |
              dex:
                config:
                  issuer: https://dex.tunnelto.dev/dex
                  storage:
                    type: memory
                  connectors:
                    - type: mockCallback
                      id: mock
                      name: Example
    ~~~
doc_link: https://dexidp.io/docs/


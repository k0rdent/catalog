services:
  dev:
    image: node:22-alpine
    working_dir: /app
    command: >
      sh -c "apk add --no-cache python3 py3-pip > /dev/null 2>&1 &&
             pip install pyyaml jinja2 ruyaml jsonschema packaging --quiet --break-system-packages &&
             cd /repo && python3 scripts/generate_catalog_json.py && python3 scripts/generate_index.py && cd /app &&
             mkdir -p /app/public/schema &&
             cp /repo/mkdocs/index.json /app/public/index.json &&
             cp /repo/mkdocs/schema/index.json /app/public/schema/index.json 2>/dev/null || true &&
             npm install &&
             npx vite"
    ports:
      - "8080:8080"
    volumes:
      - ./tsweb/:/app
      - ./:/repo
      - ./tsweb/node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - OUTPUT_DIR=/app/public
      - TEMPLATES_DIR=/app/templates
      - DIST_DIR=/app/dist

  build:
    image: node:22-alpine
    working_dir: /app
    command: >
      sh -c "apk add --no-cache python3 py3-pip > /dev/null 2>&1 &&
             pip install pyyaml jinja2 ruyaml jsonschema packaging --quiet --break-system-packages &&
             cd /repo && python3 scripts/generate_catalog_json.py && python3 scripts/generate_index.py && cd /app &&
             mkdir -p /app/public/schema &&
             cp /repo/mkdocs/index.json /app/public/index.json &&
             cp /repo/mkdocs/schema/index.json /app/public/schema/index.json 2>/dev/null || true &&
             npm install &&
             npx vite build"
    volumes:
      - ./tsweb/:/app
      - ./:/repo
      - ./tsweb/node_modules:/app/node_modules
      - ./tsweb/dist:/app/dist
    environment:
      - OUTPUT_DIR=/app/public
      - TEMPLATES_DIR=/app/templates
      - DIST_DIR=/app/dist
    profiles:
      - build

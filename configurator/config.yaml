use_cases:
  - icon: "⬡"
    title: LLM Inference
    subtitle: Serve LLMs and embedding models at scale
    example: nvidia.ai_inference
    infra:
    - id: aws
      clds:
        - id: medium
        - id: large
    - id: azure
      clds:
        - id: small
        - id: medium

  - icon: "◈"
    title: MLOps Platform
    subtitle: Train, track, and deploy ML models
    example: jupyterhub.mlops
  - icon: "✦"
    title: RAG / Vector Search
    subtitle: Build retrieval-augmented AI applications
    example: opensearch.rag
  - icon: "◉"
    title: AI Data Pipeline
    subtitle: Ingest, process, and store training data
    example: minio.data_platform
  - icon: "⬡"
    title: AI Observability
    subtitle: Monitor GPU utilization, cost, and model health
    example: opencost.ai_observability
  - icon: "◈"
    title: Internal Dev Platform
    subtitle: GitOps-driven developer platform with guardrails
    example: kyverno.secure_ai

infra:
  - title: AWS
    subtitle: EC2 or EKS managed clusters
    icon: "☁"
    id: aws
    cost:
      c5.small: 0.042
      c5.medium: 0.085
      c5.large: 0.085
      c5.xlarge: 0.170
      c5.2xlarge: 0.340
      c5.4xlarge: 0.680
    clds:
      - id: small
        title: Small
        subtitle: Basic 2 nodes cluster, dev/test or startup
        icon: "◈"
        cld: clds/aws-cld-small.yaml
      - id: medium
        title: Medium
        subtitle: Medium 5+ nodes cluster, growing production
        icon: "⬡"
        cld: clds/aws-cld-medium.yaml
      - id: large
        title: Large
        subtitle: Big 10+ nodes cluster, enterprise scale
        icon: "◉"
        cld: clds/aws-cld-large.yaml


server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /logos/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA fallback for /apps/<name>/ routes
    location ~ ^/apps/[^/]+/?$ {
        try_files $uri $uri/ /latest/index.html;
    }

    # SPA fallback for versioned app routes
    location ~ ^/v[0-9]+\.[0-9]+\.[0-9]+/apps/[^/]+/?$ {
        try_files $uri $uri/ /latest/index.html;
    }

    # Default: try files, then directory, then 404
    location / {
        try_files $uri $uri/ =404;
    }

    # Redirect root to /latest/
    location = / {
        return 302 /latest/;
    }
}

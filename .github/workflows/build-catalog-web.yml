name: Build catalog-web Docker image

on:
  push:
    branches:
      - '**'
    paths:
      - catalog-web/**
      - apps/**/data.yaml
      - apps/*/example/**
      - apps/*/charts/**
      - mkdocs/**
      - overrides/**
      - mkdocs.yml
      - scripts/build_web.sh
      - .github/workflows/build-catalog-web.yml

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine image name
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER}/catalog-web" >> "$GITHUB_OUTPUT"
          echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: catalog-web/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}

      - name: Package and push Helm chart
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          OWNER="${{ steps.meta.outputs.owner }}"

          # Update image in values.yaml for this build
          sed -i "s|repository: .*|repository: ${IMAGE}|" catalog-web/helm/values.yaml
          sed -i "s|tag: .*|tag: ${{ github.sha }}|" catalog-web/helm/values.yaml

          helm package catalog-web/helm --version 0.1.0
          helm push catalog-web-0.1.0.tgz "oci://ghcr.io/${OWNER}"

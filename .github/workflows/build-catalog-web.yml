name: Build catalog-web Docker image

on:
  push:
    branches:
      - '**'
    paths:
      - catalog-web/**
      - .github/workflows/build-catalog-web.yml
  workflow_run:
    workflows: ["Build and Deploy Catalog (TSX)"]
    types: [completed]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout gh-pages branch content
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: catalog-web/dist

      - name: Determine image name
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER}/catalog-web" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: catalog-web
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}

      - name: Package and push Helm chart
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER}/catalog-web"

          # Update image in values.yaml for this build
          sed -i "s|repository: .*|repository: ${IMAGE}|" catalog-web/helm/values.yaml
          sed -i "s|tag: .*|tag: ${{ github.sha }}|" catalog-web/helm/values.yaml

          helm package catalog-web/helm --version 0.1.0
          helm push catalog-web-0.1.0.tgz "oci://ghcr.io/${OWNER}"

name: Build and Deploy Catalog (TSX)

on:
  push:
    branches:
      - '**'
    paths:
      - apps/**/data.yaml
      - apps/*/example/**
      - apps/*/charts/**
      - k0rdent_catalog.tsx
      - tsweb/**
      - scripts/**
      - .github/workflows/gh-pages-deploy.yml
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - apps/**/data.yaml
      - apps/*/example/**
      - apps/*/charts/**
      - k0rdent_catalog.tsx
      - tsweb/**
      - scripts/**
      - .github/workflows/gh-pages-deploy.yml

permissions:
  contents: write
  actions: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Determine base path and SITE_URL
        id: base
        run: |
          if [ "${{ github.repository }}" = "k0rdent/catalog" ]; then
            echo "path=/latest/" >> "$GITHUB_OUTPUT"
            echo "site_url=https://catalog.k0rdent.io" >> "$GITHUB_OUTPUT"
          else
            REPO_NAME="${{ github.event.repository.name }}"
            OWNER="${{ github.repository_owner }}"
            echo "path=/${REPO_NAME}/latest/" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${OWNER}.github.io/${REPO_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download latest scan reports
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/helm-app-scan.yml/runs?status=success&per_page=1" \
            --jq '.workflow_runs[0].id' 2>/dev/null || true)
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful scan workflow run found, skipping"
            exit 0
          fi
          echo "Downloading scan artifacts from run $RUN_ID"
          gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.name | startswith("scan-report-")) | "\(.name) \(.id)"' | \
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            NAME=$(echo "$line" | awk '{print $1}')
            ID=$(echo "$line" | awk '{print $2}')
            APP=${NAME#scan-report-}
            mkdir -p "scan-reports/$APP"
            gh api "repos/${{ github.repository }}/actions/artifacts/$ID/zip" > "/tmp/$NAME.zip"
            unzip -o "/tmp/$NAME.zip" -d "scan-reports/$APP/"
            echo "  Downloaded: $APP"
          done

      - name: Generate catalog data for all versions
        env:
          SITE_URL: ${{ steps.base.outputs.site_url }}
        run: bash scripts/web/build-catalog-data.sh

      - name: Build SPA
        env:
          BASE_PATH: ${{ steps.base.outputs.path }}
        run: bash scripts/web/build-spa.sh

      - name: Assemble deploy folder
        run: bash scripts/web/assemble-deploy.sh

      - name: Add CNAME for custom domain (main repo only)
        if: github.repository == 'k0rdent/catalog'
        run: echo "catalog.k0rdent.io" > tsweb/deploy/CNAME

      - name: Deploy to gh-pages (push only)
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: tsweb/deploy
          publish_branch: gh-pages
          force_orphan: true
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: "Deploy catalog from ${{ github.sha }}"
